# Cost-optimized config for NVIDIA T4 (16GB, $0.30/hr spot).
# T4 has fewer CUDA cores and older Turing architecture — reduce batch size.
# Expected: ~35-45 RPS sustained (vs 49.6 on L4), 57% cheaper.

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

batch_model:
  name: "nvidia/parakeet-tdt-0.6b-v3"
  device: "cuda:0"
  compile: true
  amp: true
  cuda_graphs: false  # T4/Turing crashes with RNNT CUDA graph conditional nodes

batcher:
  max_batch_size: 32
  max_wait_seconds: 0.002
  max_queue_depth: 4096
  max_upload_bytes: 104857600
