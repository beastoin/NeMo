# Batch-only Parakeet TDT config — no streaming model loaded.
# Saves ~2GB VRAM and avoids NeMo version dependency for streaming.
#
# Benchmarked: 49.6 RPS sustained on L4, 0 failures, 0% WER.

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

batch_model:
  name: "nvidia/parakeet-tdt-0.6b-v3"
  device: "cuda:0"
  compile: true
  amp: true
  cuda_graphs: false  # CUDA Graph conditional nodes crash under high concurrency on both L4 and T4

batcher:
  max_batch_size: 32
  max_wait_seconds: 0.002
  max_queue_depth: 4096
  max_upload_bytes: 104857600
