# Batch-only Parakeet TDT config — no streaming model loaded.

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

batch_model:
  name: "nvidia/parakeet-tdt-0.6b-v3"
  device: "cuda:0"
  compile: true
  amp: true
  cuda_graphs: false

  # Attention mode: "full" (default), "local", or "auto"
  #   full  — O(T²) VRAM, max ~10min on L4. Best short-file throughput.
  #   local — O(T×W) VRAM, max ~1h on L4. Slight WER increase, ~9% less throughput.
  #   auto  — switches per-request based on audio duration (disables torch.compile).
  attention_mode: "auto"
  auto_local_attn_threshold_sec: 600
  local_attn_context: [128, 128]

  # Reject files longer than this (0 = no limit). Prevents OOM on L4:
  #   full attention:  600 (10min)
  #   local attention: 3600 (1h)
  #   auto:            3600 (1h)
  max_file_duration_sec: 3600

batcher:
  max_batch_size: 32
  max_wait_seconds: 0.002
  max_queue_depth: 4096
  max_upload_bytes: 536870912

  # VRAM-aware batch sizing: dynamically caps batch size based on audio
  # duration to prevent OOM. Set vram_safety_factor to 0 to disable.
  vram_safety_factor: 0.8
  vram_bytes_per_t2: 136.6
  starvation_timeout_sec: 5.0
