apiVersion: apps/v1
kind: Deployment
metadata:
  name: parakeet-batch
  namespace: dev-omi-backend
  labels:
    app: parakeet-batch
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: parakeet-batch
  template:
    metadata:
      labels:
        app: parakeet-batch
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: parakeet-batch
          image: parakeet-batch:latest
          args: ["python", "server.py", "--config", "conf/serving-batch-t4.yaml"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: HF_HOME
              value: "/model-cache"
            - name: NUMBA_CACHE_DIR
              value: "/tmp/numba_cache"
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "6Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: parakeet-model-cache
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: parakeet-model-cache
  namespace: dev-omi-backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard-rwo
